<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Automated Analytics Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Automated Analytics Dashboard</h1>

        <p>
            Upload your CSV or Excel file and get complete data analysis.
        </p>

        <form
            action="/upload"
            method="POST"
            enctype="multipart/form-data">

            <input
                type="file"
                name="file"
                accept=".csv,.xlsx"
                required>

            <br><br>

            <button type="submit">

                Analyze Dataset

            </button>

        </form>

    </div>

</body>

</html>
